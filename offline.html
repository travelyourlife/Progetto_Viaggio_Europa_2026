<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>Quo Vadis — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);
  color:#e2e8f0;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
}
.icon{font-size:64px;margin-bottom:20px;opacity:0.9}
h1{font-size:22px;font-weight:700;margin-bottom:8px;color:#fff}
p{font-size:15px;line-height:1.5;color:#94a3b8;max-width:300px;margin-bottom:24px}
button{
  background:#3b82f6;color:#fff;border:none;border-radius:10px;
  padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;
  transition:transform 0.15s;
}
button:active{transform:scale(0.95)}
.version{position:fixed;bottom:12px;font-size:11px;color:#475569}
</style>
</head>
<body>
<div class="icon">📡</div>
<h1>Sei offline</h1>
<p>Nessuna connessione disponibile. Controlla il Wi-Fi o i dati mobili e riprova.</p>
<button onclick="location.reload()">Riprova</button>
<div class="version">Quo Vadis v3.09</div>
</body>
</html>
