<!-- ─── OWNER VARIANTE A: Daily Briefing ─── -->
<template id="hv-owner-a">
<div class="hv-page hv-owner-a">
    <!-- Hero status bar -->
    <div class="hv-hero-status">
        <div class="hv-hero-status-left">
            <span class="hv-status-badge hv-badge-green">● IN VIAGGIO</span>
            <div class="hv-hero-city">📍 <span data-hv="city">--</span></div>
            <div class="hv-hero-country"><span data-hv="country">--</span> <span data-hv="flag"></span></div>
        </div>
        <div class="hv-hero-status-right">
            <div class="hv-day-badge" data-hv-action="goToDay" style="cursor:pointer;">
                <span class="hv-day-num" data-hv="dayLabel">G--</span>
                <span class="hv-day-date" data-hv="dayDate"></span>
            </div>
            <img src="./icon.png" alt="Famiglia" class="hv-hero-avatar hv-avatar-clickable" data-hv-action="expandAvatar">
        </div>
    </div>
    <!-- Weather row -->
    <div class="hv-weather-row">
        <span data-hv="weatherIcon">🌤</span> <span data-hv="temp">--°C</span>
        <span class="hv-sep">·</span>
        <span>🌅</span> <span data-hv="daylight">--</span>
        <span class="hv-sep">·</span>
        <span>🚐</span> <span data-hv="kmToday">-- km oggi</span>
    </div>
    <!-- Programma di oggi -->
    <div class="hv-section">
        <div class="hv-section-header">
            <span>📅 Programma di oggi</span>
            <a class="hv-link" data-hv-action="openDay">Dettagli →</a>
        </div>
        <div class="hv-today-program" data-hv="todayProgram">
            <!-- Populated dynamically -->
        </div>
    </div>
    <!-- Azioni rapide -->
    <div class="hv-section">
        <div class="hv-section-label">AZIONI RAPIDE</div>
        <div class="hv-actions-grid">
            <a class="hv-action-card" data-hv-action="tab:diario">
                <span class="hv-action-icon">📖</span>
                <span class="hv-action-label">Diario</span>
                <span class="hv-action-sub" data-hv="diarioStatus">Da compilare</span>
            </a>
            <a class="hv-action-card" data-hv-action="tab:chat">
                <span class="hv-action-icon">💬</span>
                <span class="hv-action-label">Chat</span>
                <span class="hv-action-sub" data-hv="chatStatus"></span>
            </a>
            <a class="hv-action-card" data-hv-action="checkin">
                <span class="hv-action-icon">📍</span>
                <span class="hv-action-label">Check-in</span>
                <span class="hv-action-sub" data-hv="checkinStatus">Fai check-in</span>
            </a>
            <a class="hv-action-card" data-hv-action="openMap">
                <span class="hv-action-icon">🗺️</span>
                <span class="hv-action-label">Mappa</span>
                <span class="hv-action-sub" data-hv="kmTotal"></span>
            </a>
        </div>
    </div>
    <!-- Progress bar -->
    <div class="hv-progress-compact">
        <div class="hv-progress-info">
            <span data-hv="progressText">G--/54 · -- km · --/13 paesi</span>
            <span class="hv-progress-pct" data-hv="progressPct">--%</span>
        </div>
        <div class="hv-dash-progress-bar"><div class="hv-dash-progress-fill" data-hv="progressBar"></div></div>
    </div>
    <!-- Preparativi (shown only pre-trip via JS) -->
    <div class="hv-section hv-pre-section" id="hv-owner-preparativi">
        <div class="hv-section-label">✅ PREPARATIVI</div>
        <div class="hv-checklist-links">
            <a class="hv-checklist-link" data-hv-action="tab:piano">
                <span class="hv-checklist-icon">📋</span>
                <span class="hv-checklist-text">Controlla il Piano</span>
                <span class="hv-chevron">›</span>
            </a>
            <a class="hv-checklist-link" data-hv-action="tab:zaino">
                <span class="hv-checklist-icon">🎒</span>
                <span class="hv-checklist-text">Prepara lo Zaino</span>
                <span class="hv-chevron">›</span>
            </a>
            <a class="hv-checklist-link" data-hv-action="tab:giorni">
                <span class="hv-checklist-icon">🗺️</span>
                <span class="hv-checklist-text">Studia l'itinerario</span>
                <span class="hv-chevron">›</span>
            </a>
            <a class="hv-checklist-link" data-hv-action="openGpsGuide">
                <span class="hv-checklist-icon">📍</span>
                <span class="hv-checklist-text">Configura GPS Logger</span>
                <span class="hv-chevron">›</span>
            </a>
        </div>
    </div>
    <!-- Esplora -->
    <div class="hv-section">
        <div class="hv-section-label">ESPLORA</div>
        <div class="hv-explore-chips">
            <a class="hv-chip" data-hv-action="tab:cibo">🍝 Cibo</a>
            <a class="hv-chip" data-hv-action="tab:cultura">🏛️ Cultura</a>
            <a class="hv-chip" data-hv-action="tab:attivita">🥾 Attività</a>
            <a class="hv-chip" data-hv-action="tab:luoghi">📍 Luoghi</a>
            <a class="hv-chip" data-hv-action="tab:riepilogo">📌 Riepilogo</a>
            <a class="hv-chip" data-hv-action="openCuriosity">💡 Curiosità</a>
        </div>
    </div>
    <!-- Strumenti -->
    <div class="hv-section">
        <div class="hv-section-label">STRUMENTI</div>
        <div class="hv-tools-row">
            <a class="hv-tool" data-hv-action="tab:piano">📋 Piano</a>
            <a class="hv-tool" data-hv-action="tab:zaino">🎒 Zaino</a>
            <a class="hv-tool" data-hv-action="admin">⚙️ Admin</a>
            <a class="hv-tool" data-hv-action="updateApp">🔄 Aggiorna</a>
        </div>
    </div>
    <div class="hv-app-footer">
        <span class="hv-version" data-hv="version"></span>
    </div>
</div>
</template>

<!-- ─── OWNER VARIANTE D: Timeline Giornaliera ─── -->

            <!-- Populated dynamically -->
        </div>
    </div>
</div>
</template>
