<!-- ─── OWNER VARIANTE A: Daily Briefing ─── -->
<template id="hv-owner-a">
<div class="hv-page hv-owner-a">
    <!-- ═══ PRE-TRIP HERO (v1.99 redesign) ═══ -->
    <div class="hv-pretrip-hero hv-card-clickable" data-hv-action="goToFirstDay" style="cursor:pointer;" title="Go to itinerary">
        <div class="hv-pretrip-hero-main">
            <div class="hv-pretrip-hero-left">
                <span class="hv-pretrip-label">NEXT ADVENTURE</span>
                <div class="hv-pretrip-countdown">
                    <span class="hv-pretrip-number" data-hv="daysUntil">--</span>
                    <span class="hv-pretrip-text" data-hv="countdownText">days until departure</span>
                </div>
                <div class="hv-pretrip-date" data-trip-meta="startEN">📅 June 25, 2026</div>
            </div>
            <img src="./icon.png" alt="Family" class="hv-hero-avatar hv-avatar-clickable" data-hv-action="expandAvatar">
        </div>
        <div class="hv-pretrip-weather">
            <span class="hero-info-block">🎯 <span data-hv="city">--</span></span>
            <span class="hv-sep">·</span>
            <span class="hero-info-block"><span data-hv="weatherIcon">🌤</span> <span data-hv="temp">--°C</span></span>
            <span class="hv-sep">·</span>
            <span class="hero-info-block">🌅 <span data-hv="daylight">--</span></span>
        </div>
    </div>
    <!-- ═══ DURING-TRIP HERO (v3.90: row1b for day/date) ═══ -->
    <div class="hv-during-hero hv-during-hero-v210">
        <!-- Row 1: Status + distance -->
        <div class="hv-hero-row1">
            <div class="hv-hero-row1-left">
                <span class="hv-status-badge hv-badge-green" data-hv="statusBadge">🟢 ON THE ROAD</span>
                <span class="hv-hero-distance-inline" data-hv="distanceFromHome"></span>
            </div>
        </div>
        <!-- Row 1b: Day + date -->
        <div class="hv-hero-row1b">
            <span class="hv-day-num-inline" data-hv="dayLabel" data-hv-action="goToDay" style="cursor:pointer;" title="Go to day">D--</span>
            <span class="hv-hero-dot">·</span>
            <span class="hv-hero-date-inline" data-hv="dayDateShort"></span>
        </div>
        <!-- Row 2: City + Country + avatar -->
        <div class="hv-hero-row2">
            <div class="hv-hero-row2-left" data-hv-action="tab:posizione" style="cursor:pointer;" title="Open Travel">
                <span class="hv-hero-city-inline">📍 <span data-hv="city">--</span></span>
                <span class="hv-hero-dot">·</span>
                <span class="hv-hero-country-inline"><span data-hv="country">--</span> <span data-hv="flag"></span></span>
            </div>
            <img src="./icon.png" alt="Family" class="hv-hero-avatar hv-avatar-clickable" data-hv-action="expandAvatar">
        </div>
        <!-- Row 3: Weather + light -->
        <div class="hv-hero-weather-row">
            <span class="hero-info-block"><span data-hv="weatherIcon">🌤</span> <span class="hero-weather-bold" data-hv="temp">--°C</span></span>
            <span class="hv-sep">·</span>
            <span class="hero-info-block">🌅 <span data-hv="daylight">--</span></span>
        </div>
        <!-- Dashed separator -->
        <hr class="hv-hero-separator-dashed" data-hv="nextStopSep" style="display:none;">
        <!-- Next stop sub-row -->
        <div class="hv-hero-next-stop-row" data-hv="nextStopRow" style="display:none;">
            <span class="hero-info-block" style="font-size:11px;opacity:0.7;" data-hv="nextStopLabel">Next stop:</span>
            <span class="hero-info-block">🎯 <span class="hero-weather-bold" data-hv="nextStopCity">--</span></span>
            <span class="hv-sep">·</span>
            <span class="hero-info-block"><span data-hv="nextStopWeather">🌤 --°C</span></span>
            <span class="hv-sep">·</span>
            <span class="hero-info-block" data-hv="nextStopWhen">Tomorrow</span>
        </div>
    </div>
    <!-- Quick actions -->
    <div class="hv-section">
        <div class="hv-section-label">QUICK ACTIONS</div>
        <div class="hv-actions-grid">
            <a class="hv-action-card" data-hv-action="tab:diario">
                <span class="hv-action-icon">📖</span>
                <span class="hv-action-label">Diary</span>
                <span class="hv-action-sub" data-hv="diarioStatus"></span>
            </a>
            <a class="hv-action-card" data-hv-action="tab:chat">
                <span class="hv-action-icon">💬</span>
                <span class="hv-action-label">Chat</span>
                <span class="hv-action-sub" data-hv="chatStatus"></span>
            </a>
            <a class="hv-action-card" data-hv-action="checkin">
                <span class="hv-action-icon">📍</span>
                <span class="hv-action-label">Check-in</span>
                <span class="hv-action-sub" data-hv="checkinStatus">Do check-in</span>
            </a>
            <a class="hv-action-card" data-hv-action="openMap">
                <span class="hv-action-icon">🗺️</span>
                <span class="hv-action-label">Map</span>
                <span class="hv-action-sub" data-hv="kmTotal"></span>
            </a>
            <a class="hv-action-card hv-tracking-card" data-hv-action="toggleTracking" id="hv-tracking-card" style="display:none;">
                <span class="hv-action-icon" id="hv-tracking-icon">🛰️</span>
                <span class="hv-action-label" id="hv-tracking-label">Tracking</span>
                <span class="hv-action-sub" id="hv-tracking-sub">▶ Start</span>
            </a>
            <a class="hv-action-card hv-admin-card" data-hv-action="tab:admin" id="hv-admin-card" style="display:none;">
                <span class="hv-action-icon">🛠️</span>
                <span class="hv-action-label">Admin</span>
                <span class="hv-action-sub" id="hv-admin-sub">Manage</span>
            </a>
        </div>
    </div>
    <!-- Today's program -->
    <div class="hv-section">
        <div class="hv-section-header">
            <span>📅 Today's program</span>
            <a class="hv-link" data-hv-action="openDay">Details →</a>
        </div>
        <div class="hv-today-program" data-hv="todayProgram">
            <!-- Populated dynamically -->
        </div>
    </div>
    <!-- Preparations (shown only pre-trip via JS) -->
    <div class="hv-section hv-pre-section" id="hv-owner-preparativi">
        <div class="hv-section-label">✅ PREPARATIONS</div>
        <div class="hv-checklist-links">
            <a class="hv-checklist-link" data-hv-action="tab:piano">
                <span class="hv-checklist-icon">📋</span>
                <span class="hv-checklist-text">Check the Plan</span>
                <span class="hv-chevron">›</span>
            </a>
            <a class="hv-checklist-link" data-hv-action="tab:zaino">
                <span class="hv-checklist-icon">🎒</span>
                <span class="hv-checklist-text">Pack the Bag</span>
                <span class="hv-chevron">›</span>
            </a>
            <a class="hv-checklist-link" data-hv-action="tab:giorni">
                <span class="hv-checklist-icon">📅</span>
                <span class="hv-checklist-text">Study the itinerary</span>
                <span class="hv-chevron">›</span>
            </a>
        </div>
    </div>
    <!-- Explore -->
    <div class="hv-section">
        <div class="hv-section-label">EXPLORE</div>
        <div class="hv-explore-chips">
            <a class="hv-chip" data-hv-action="tab:cibo">🍝 Food</a>
            <a class="hv-chip" data-hv-action="tab:cultura">🏛️ Culture</a>
            <a class="hv-chip" data-hv-action="tab:attivita">🥾 Activities</a>
            <a class="hv-chip" data-hv-action="tab:luoghi">🧭 Places</a>
            <a class="hv-chip" data-hv-action="tab:riepilogo">📌 Summary</a>
            <a class="hv-chip" data-hv-action="openCuriosity">💡 Curiosity</a>
        </div>
    </div>
    <!-- Tools -->
    <div class="hv-section">
        <div class="hv-section-label">TOOLS</div>
        <div class="hv-tools-row">
            <a class="hv-tool" data-hv-action="tab:piano">📋 Plan</a>
            <a class="hv-tool" data-hv-action="tab:zaino">🎒 Bag</a>
            <a class="hv-tool" data-hv-action="admin">🛠️ Admin</a>
            <a class="hv-tool" data-hv-action="updateApp">🔄 Update</a>
        </div>
    </div>
    <div class="hv-app-footer">
        <span class="hv-version" data-hv="version"></span>
    </div>
</div>
</template>
