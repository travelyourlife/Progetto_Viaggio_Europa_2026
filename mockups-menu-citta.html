<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quo Vadis — Mockup menù città</title>
<style>
:root{
  --primary:#1a3a5c; --primary-light:#2c5282; --accent:#3182ce; --accent-light:#63b3ed;
  --success:#38a169; --warning:#d69e2e; --danger:#e53e3e;
  --bg:#f7fafc; --bg-card:#fff; --bg-alt:#edf2f7; --border:#e2e8f0;
  --text:#1a202c; --text-muted:#5a6a7e;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 4px 12px rgba(0,0,0,.1); --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --radius:12px; --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#e2e8f0;color:var(--text);padding:28px 16px 60px;-webkit-font-smoothing:antialiased}
h1.page{text-align:center;color:var(--primary);font-size:22px;margin-bottom:4px}
p.page-sub{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px}

/* phone frame */
.grid{display:flex;flex-wrap:wrap;gap:34px;justify-content:center;align-items:flex-start}
.phone-wrap{width:340px}
.phone-title{text-align:center;font-weight:800;color:var(--primary);margin-bottom:4px;font-size:15px}
.phone-desc{text-align:center;color:var(--text-muted);font-size:12px;margin-bottom:12px;line-height:1.4;min-height:46px}
.phone{width:340px;height:720px;background:var(--bg);border-radius:34px;border:10px solid #11161d;box-shadow:var(--shadow-lg);overflow:hidden;position:relative;display:flex;flex-direction:column}

/* top bar */
.topbar{height:52px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex:0 0 auto}
.topbar .brand{font-weight:800;font-size:15px;letter-spacing:.3px}
.topbar .acts{display:flex;gap:14px;font-size:16px;opacity:.95}

/* scroll area */
.screen{flex:1 1 auto;overflow-y:auto;position:relative}
.screen::-webkit-scrollbar{width:0}
.pad{padding:14px 14px 90px}

.tab-h{font-size:18px;font-weight:800;color:var(--primary);margin:2px 0 2px}
.tab-sub{font-size:12px;color:var(--text-muted);margin-bottom:14px}

/* bottom bar */
.botbar{position:absolute;left:0;right:0;bottom:0;height:64px;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex:0 0 auto;z-index:30}
.botbar .it{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text-muted)}
.botbar .it.active{color:var(--accent)}
.botbar .it .ic{font-size:19px}

/* ===== shared city card ===== */
.city-intro{font-size:12.5px;color:var(--text-muted);line-height:1.5;margin:8px 0 12px}
.map-btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;margin-bottom:12px}
.stop{display:flex;gap:10px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.stop .num{width:26px;height:26px;border-radius:50%;color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.stop .nm{font-weight:700;font-size:13.5px}
.stop .sh{font-size:12px;color:var(--text-muted);line-height:1.45;margin-top:3px}
.stop .star{color:var(--warning);font-size:11px}

/* =========================================================
   OPTION 1 — horizontal scrollable chips (single row)
========================================================= */
.o1-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none}
.o1-chips::-webkit-scrollbar{display:none}
.o1-chip{flex:0 0 auto;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;box-shadow:var(--shadow-sm)}
.o1-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.o1-fade{position:relative}
.o1-fade:after{content:"";position:absolute;right:0;top:4px;bottom:10px;width:32px;background:linear-gradient(90deg,rgba(247,250,252,0),var(--bg));pointer-events:none}

/* =========================================================
   OPTION 2 — compact dropdown / select
========================================================= */
.o2-select{width:100%;display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-sm);font-size:14px;font-weight:700;color:var(--primary)}
.o2-select .chev{color:var(--text-muted)}
.o2-menu{margin-top:6px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-md);overflow:hidden;max-height:250px;overflow-y:auto}
.o2-item{display:flex;align-items:center;gap:9px;padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--bg-alt)}
.o2-item:last-child{border-bottom:none}
.o2-item.sel{background:var(--bg-alt);font-weight:700;color:var(--primary)}
.o2-item .ck{margin-left:auto;color:var(--accent)}

/* =========================================================
   OPTION 3 — vertical accordion (click city -> expands inline)
========================================================= */
.o3-list{display:flex;flex-direction:column;gap:8px}
.o3-city{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm);overflow:hidden}
.o3-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.o3-head .fl{font-size:18px}
.o3-head .nm{font-weight:700;font-size:14px;color:var(--text)}
.o3-head .co{font-size:11px;color:var(--text-muted);margin-left:2px}
.o3-head .arr{margin-left:auto;color:var(--text-muted);transition:transform .25s}
.o3-city.open .o3-head{background:var(--primary);}
.o3-city.open .o3-head .nm,.o3-city.open .o3-head .co,.o3-city.open .o3-head .arr{color:#fff}
.o3-city.open .o3-head .arr{transform:rotate(180deg)}
.o3-body{display:none;padding:12px 13px 14px;border-top:1px solid var(--border)}
.o3-city.open .o3-body{display:block}

/* =========================================================
   OPTION 4 — bottom sheet
========================================================= */
.o4-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:13px 15px;font-size:14px;font-weight:700;box-shadow:var(--shadow-sm)}
.o4-scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:40;display:flex;align-items:flex-end}
.o4-sheet{background:#fff;width:100%;border-radius:18px 18px 0 0;max-height:74%;display:flex;flex-direction:column;box-shadow:0 -6px 24px rgba(0,0,0,.2)}
.o4-grab{width:42px;height:5px;border-radius:3px;background:#cbd5e0;margin:9px auto 4px}
.o4-sheet h4{padding:4px 16px 10px;color:var(--primary);font-size:15px;border-bottom:1px solid var(--border)}
.o4-scroll{overflow-y:auto;padding:6px 0}
.o4-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;border-bottom:1px solid var(--bg-alt)}
.o4-item.sel{background:var(--bg-alt);font-weight:700;color:var(--primary)}
.o4-item .ck{margin-left:auto;color:var(--accent)}

.note{font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px;line-height:1.4}
.badge{display:inline-block;background:var(--bg-alt);color:var(--primary);font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:6px}
</style>
</head>
<body>
<h1 class="page">Quo Vadis · Menù città — 4 opzioni</h1>
<p class="page-sub">21 città reali · stile app reale · interagisci pure (chip scroll, dropdown, accordion, bottom sheet)</p>

<div class="grid" id="grid"></div>

<script>
var CITIES = [
 {n:"Leoben",c:"Austria",f:"🇦🇹"},{n:"Vienna",c:"Austria",f:"🇦🇹"},{n:"Varsavia",c:"Polonia",f:"🇵🇱"},
 {n:"Vilnius",c:"Lituania",f:"🇱🇹"},{n:"Riga",c:"Lettonia",f:"🇱🇻"},{n:"Tallinn",c:"Estonia",f:"🇪🇪"},
 {n:"Rovaniemi",c:"Finlandia",f:"🇫🇮"},{n:"Oulu",c:"Finlandia",f:"🇫🇮"},{n:"Tromsø",c:"Norvegia",f:"🇳🇴"},
 {n:"Trondheim",c:"Norvegia",f:"🇳🇴"},{n:"Stavanger",c:"Norvegia",f:"🇳🇴"},{n:"Kristiansand",c:"Norvegia",f:"🇳🇴"},
 {n:"Bergen",c:"Norvegia",f:"🇳🇴"},{n:"Copenaghen",c:"Danimarca",f:"🇩🇰"},{n:"Brema",c:"Germania",f:"🇩🇪"},
 {n:"Amiens",c:"Francia",f:"🇫🇷"},{n:"San Sebastián",c:"Spagna",f:"🇪🇸"},{n:"Bilbao",c:"Spagna",f:"🇪🇸"},
 {n:"León",c:"Spagna",f:"🇪🇸"},{n:"Palencia",c:"Spagna",f:"🇪🇸"},{n:"Genova",c:"Italia",f:"🇮🇹"}
];
// sample stops (Riga) for the opened-city preview
var STOPS = [
 {n:1,nm:"Cattedrale di Riga",sh:"Il duomo luterano più grande del Baltico, sul cuore della città vecchia.",col:"#e53e3e",star:"★★"},
 {n:2,nm:"Casa delle Teste Nere",sh:"Iconica facciata fiamminga ricostruita, simbolo di Riga.",col:"#e53e3e",star:"★★"},
 {n:3,nm:"Quartiere Art Nouveau",sh:"Via Alberta: la più alta concentrazione di Jugendstil d'Europa.",col:"#d69e2e",star:"★"},
 {n:4,nm:"Mercato Centrale",sh:"Padiglioni in ex hangar per zeppelin: street food e prodotti locali.",col:"#3182ce",star:""}
];

function intro(city){
  return "Scopri "+city.n+", "+ (city.c==="Italia"?"perla":"gioiello") +" del nostro itinerario. Un percorso a piedi tra piazze, monumenti e angoli autentici da vivere con calma.";
}
function stopsHtml(){
  return STOPS.map(function(s){
    return '<div class="stop"><div class="num" style="background:'+s.col+'">'+s.n+'</div>'+
      '<div><div class="nm">'+s.nm+(s.star?' <span class="star">'+s.star+'</span>':'')+'</div>'+
      '<div class="sh">'+s.sh+'</div></div></div>';
  }).join('');
}
function botbar(){
  return '<div class="botbar">'+
   '<div class="it"><span class="ic">🏠</span>Home</div>'+
   '<div class="it active"><span class="ic">📅</span>Itinerario</div>'+
   '<div class="it"><span class="ic">📍</span>In viaggio</div>'+
   '<div class="it"><span class="ic">⋯</span>Altro</div>'+
  '</div>';
}
function shell(title,desc,inner,badge){
  return '<div class="phone-wrap">'+
    '<div class="phone-title">'+title+'</div>'+
    '<div class="phone-desc">'+desc+'</div>'+
    '<div class="phone">'+
      '<div class="topbar"><span class="brand">Quo Vadis</span><span class="acts">🔍 ⚙️</span></div>'+
      '<div class="screen"><div class="pad">'+
        '<div class="tab-h">Itinerari città</div>'+
        '<div class="tab-sub">21 città · seleziona una città</div>'+ inner +
        (badge?'<div style="text-align:center"><span class="badge">'+badge+'</span></div>':'')+
      '</div></div>'+
      botbar()+
    '</div>'+
  '</div>';
}

/* ---- Option 1: horizontal chips ---- */
function opt1(){
  var chips = CITIES.map(function(c,i){
    return '<button class="o1-chip'+(i===4?' active':'')+'">'+c.f+' '+c.n+'</button>';
  }).join('');
  var inner = '<div class="o1-fade"><div class="o1-chips">'+chips+'</div></div>'+
    '<div class="city-intro">'+intro(CITIES[4])+'</div>'+
    '<button class="map-btn">🗺️ Apri mappa</button>'+
    stopsHtml();
  return shell('1 · Chip orizzontali','Una sola riga scorrevole in orizzontale. Occupa pochissima altezza, resta sempre visibile in cima.',inner,'Riga selezionata · scorri i chip →');
}

/* ---- Option 2: dropdown ---- */
function opt2(open){
  var items = CITIES.map(function(c,i){
    return '<div class="o2-item'+(i===4?' sel':'')+'">'+c.f+' '+c.n+' <span style="color:var(--text-muted);font-size:11px">'+c.c+'</span>'+(i===4?'<span class="ck">✓</span>':'')+'</div>';
  }).join('');
  var menu = open? '<div class="o2-menu">'+items+'</div>' : '';
  var inner = '<div class="o2-select">🇱🇻 Riga <span class="chev">▾</span></div>'+menu+
    (open?'':'<div class="city-intro">'+intro(CITIES[4])+'</div><button class="map-btn">🗺️ Apri mappa</button>'+stopsHtml());
  return shell('2 · Dropdown compatto', open?'Menù a tendina aperto: la lista scrollabile copre solo una parte dello schermo.':'Stato chiuso: solo un selettore compatto. Tocca per aprire la lista.', inner, open?'Dropdown aperto':'Tocca il selettore');
}

/* ---- Option 3: accordion ---- */
function opt3(){
  var list = CITIES.slice(0,7).map(function(c,i){
    var open = (i===4);
    return '<div class="o3-city'+(open?' open':'')+'">'+
      '<div class="o3-head"><span class="fl">'+c.f+'</span><span class="nm">'+c.n+'</span><span class="co">'+c.c+'</span><span class="arr">▾</span></div>'+
      '<div class="o3-body">'+
        '<div class="city-intro" style="margin-top:0">'+intro(c)+'</div>'+
        '<button class="map-btn">🗺️ Apri mappa</button>'+
        stopsHtml()+
      '</div>'+
    '</div>';
  }).join('');
  var inner = '<div class="o3-list">'+list+'</div><div class="note">…e così via per tutte le 21 città</div>';
  return shell('3 · Accordion verticale','La tua idea: lista compatta; al tap la città si espande in linea e la pagina scorre fino ad essa.',inner,'Riga espansa in linea');
}

/* ---- Option 4: bottom sheet ---- */
function opt4(open){
  var items = CITIES.map(function(c,i){
    return '<div class="o4-item'+(i===4?' sel':'')+'">'+c.f+' '+c.n+' <span style="color:var(--text-muted);font-size:12px">'+c.c+'</span>'+(i===4?'<span class="ck">✓</span>':'')+'</div>';
  }).join('');
  var base = '<button class="o4-trigger">🇱🇻 Riga — cambia città <span>▾</span></button>'+
    '<div class="city-intro">'+intro(CITIES[4])+'</div><button class="map-btn">🗺️ Apri mappa</button>'+stopsHtml();
  var sheet = open? '<div class="o4-scrim"><div class="o4-sheet"><div class="o4-grab"></div><h4>Scegli città</h4><div class="o4-scroll">'+items+'</div></div></div>':'';
  // sheet must be inside .phone (absolute), so append after screen
  return '<div class="phone-wrap">'+
    '<div class="phone-title">4 · Bottom sheet</div>'+
    '<div class="phone-desc">'+(open?'Pannello che sale dal basso (~70%): lista scrollabile, il resto resta visibile dietro.':'Pulsante che apre il pannello dal basso.')+'</div>'+
    '<div class="phone">'+
      '<div class="topbar"><span class="brand">Quo Vadis</span><span class="acts">🔍 ⚙️</span></div>'+
      '<div class="screen"><div class="pad"><div class="tab-h">Itinerari città</div><div class="tab-sub">21 città · seleziona una città</div>'+base+'</div></div>'+
      sheet+
      botbar()+
    '</div>'+
  '</div>';
}

document.getElementById('grid').innerHTML =
  opt1() + opt2(true) + opt3() + opt4(true);
</script>
</body>
</html>
